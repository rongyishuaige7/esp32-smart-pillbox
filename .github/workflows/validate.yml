name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: esp32-smart-pillbox-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Repository, firmware and Flutter client
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: .github/platformio-requirements.txt

      - name: Install PlatformIO
        run: python -m pip install --require-hashes -r .github/platformio-requirements.txt

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: "3.41.2"
          cache: true
          cache-key: flutter-3.41.2-${{ runner.os }}-${{ hashFiles('app/pubspec.lock') }}

      - name: Run repository and source-contract gates
        run: |
          python scripts/secret_scan.py
          python scripts/check_repo.py
          python -m unittest discover -s tests -v

      - name: Build ESP32 firmware
        run: pio run -d firmware

      - name: Validate Flutter client
        working-directory: app
        run: |
          flutter pub get
          flutter test
          flutter analyze
          flutter build web --release

      - name: Upload build evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: esp32-smart-pillbox-${{ github.sha }}
          path: |
            firmware/.pio/build/esp32dev/firmware.bin
            firmware/.pio/build/esp32dev/firmware.elf
            app/build/web/
          if-no-files-found: error
          retention-days: 14
