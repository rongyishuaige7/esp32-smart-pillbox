[env:esp32dev]
platform = espressif32@6.13.0
board = esp32dev
framework = arduino
monitor_speed = 115200

lib_deps =
    bblanchon/ArduinoJson@^6.21.3
    olikraus/U8g2@^2.34.0
    bogde/HX711@^0.7.5

build_flags =
    -DCORE_DEBUG_LEVEL=3
    ; 若 RGB 为共阴（公共端接 GND、引脚高电平亮），取消下一行注释并重新编译：
    ; -DRGB_ACTIVE_HIGH=1
